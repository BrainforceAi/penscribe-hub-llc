<!doctype html>
<html><head><meta charset="utf-8"><title>Stats</title>
<link rel="stylesheet" href="_card.css">
<style>
  body { padding: 32px; background: var(--ps-paper); }
  .grid { display: grid; grid-template-columns: repeat(3, 1fr); }
  .s { padding: 8px 24px; border-left: 1px solid var(--border-1); }
  .s:first-child { border-left: 0; padding-left: 0; }
  .num { font-family: var(--font-display); font-size: 76px; line-height: 0.95; color: var(--ps-brand); letter-spacing: 0; }
  .lab { font-family: var(--font-sans); font-size: 13px; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; color: var(--fg-2); margin-top: 8px; line-height: 1.3; }
  .sub { font-family: var(--font-sans); font-size: 12px; color: var(--fg-3); margin-top: 4px; }
</style></head>
<body>
<div class="grid">
  <div class="s">
    <div class="num">90%</div>
    <div class="lab">Proposal Win Rate</div>
    <div class="sub">Across all submitted proposals</div>
  </div>
  <div class="s">
    <div class="num">$124K</div>
    <div class="lab">Largest Annual Award</div>
    <div class="sub">RBHA, 2025</div>
  </div>
  <div class="s">
    <div class="num">3</div>
    <div class="lab">Agency Types Served</div>
    <div class="sub">Federal · State · Municipal</div>
  </div>
</div>
</body></html>
