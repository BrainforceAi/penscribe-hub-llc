<!doctype html>
<html><head><meta charset="utf-8"><title>Spacing</title>
<link rel="stylesheet" href="_card.css">
<style>
  body { padding: 24px 32px; }
  .row { display: grid; grid-template-columns: 80px 1fr 80px; align-items: center; gap: 16px; padding: 6px 0; }
  .tok { font-family: var(--font-mono); font-size: 11px; color: var(--fg-3); }
  .bar { background: var(--ps-brand); height: 18px; border-radius: 2px; }
  .px { font-family: var(--font-mono); font-size: 11px; color: var(--fg-4); text-align: right; }
  h4 { font-family: var(--font-sans); font-size: 13px; font-weight: 700; letter-spacing: 0.14em; text-transform: uppercase; color: var(--ps-brand); margin-bottom: 10px; }
</style></head>
<body>
<h4>Spacing · 4-pt baseline</h4>
<div class="row"><div class="tok">--s-1</div><div><div class="bar" style="width:4px"></div></div><div class="px">4px</div></div>
<div class="row"><div class="tok">--s-2</div><div><div class="bar" style="width:8px"></div></div><div class="px">8px</div></div>
<div class="row"><div class="tok">--s-3</div><div><div class="bar" style="width:12px"></div></div><div class="px">12px</div></div>
<div class="row"><div class="tok">--s-4</div><div><div class="bar" style="width:16px"></div></div><div class="px">16px</div></div>
<div class="row"><div class="tok">--s-5</div><div><div class="bar" style="width:24px"></div></div><div class="px">24px</div></div>
<div class="row"><div class="tok">--s-6</div><div><div class="bar" style="width:32px"></div></div><div class="px">32px</div></div>
<div class="row"><div class="tok">--s-7</div><div><div class="bar" style="width:48px"></div></div><div class="px">48px</div></div>
<div class="row"><div class="tok">--s-8</div><div><div class="bar" style="width:64px"></div></div><div class="px">64px</div></div>
<div class="row"><div class="tok">--s-9</div><div><div class="bar" style="width:96px"></div></div><div class="px">96px</div></div>
<div class="row"><div class="tok">--s-10</div><div><div class="bar" style="width:128px"></div></div><div class="px">128px</div></div>
</body></html>
