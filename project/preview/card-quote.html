<!doctype html>
<html><head><meta charset="utf-8"><title>Quote</title>
<link rel="stylesheet" href="_card.css">
<style>
  body { padding: 36px 40px; background: var(--ps-brand); }
  .mark { font-family: var(--font-serif); font-style: italic; font-size: 92px; line-height: 0.7; color: var(--ps-blue-200); margin-bottom: -8px; }
  .q { font-family: var(--font-serif); font-style: italic; font-weight: 400; font-size: 28px; line-height: 1.3; color: #fff; text-wrap: balance; max-width: 580px; }
  .attr { font-family: var(--font-sans); font-size: 12px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: var(--ps-blue-100); margin-top: 22px; }
  .attr .sep { color: var(--ps-blue-300); margin: 0 8px; }
</style></head>
<body>
<div class="mark">"</div>
<div class="q">Our proposal had the highest rating of all the vendors and I have been invited for a final in-person interview.</div>
<div class="attr">Broderick Thomas <span class="sep">·</span> CEO, 3XG Enterprises LLC <span class="sep">·</span> Richmond, VA</div>
</body></html>
