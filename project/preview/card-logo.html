<!doctype html>
<html><head><meta charset="utf-8"><title>Logo</title>
<link rel="stylesheet" href="_card.css">
<style>
  body { padding: 0; background: transparent; }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0; min-height: 260px; }
  .pane { display: flex; align-items: center; justify-content: center; padding: 32px; }
  .pane.paper { background: var(--ps-paper); }
  .pane.brand { background: var(--ps-brand); }
  .lockup { display: flex; flex-direction: column; align-items: center; gap: 8px; }
  .lockup img { width: 110px; height: 110px; object-fit: contain; }
  .paper .lockup img { content: url('../assets/penscribe-logo-on-white.jpg'); }
  .brand .lockup img { content: url('../assets/penscribe-logo-on-blue.jpg'); }
  .caption { font-family: var(--font-sans); font-size: 11px; font-weight: 700; letter-spacing: 0.14em; text-transform: uppercase; }
  .paper .caption { color: var(--ps-brand); }
  .brand .caption { color: var(--ps-blue-100); }
</style></head>
<body>
<div class="grid">
  <div class="pane paper">
    <div class="lockup">
      <img alt="Logo on paper" />
      <div class="caption">Primary · on paper</div>
    </div>
  </div>
  <div class="pane brand">
    <div class="lockup">
      <img alt="Logo on brand blue" />
      <div class="caption">Inverse · on brand</div>
    </div>
  </div>
</div>
</body></html>
