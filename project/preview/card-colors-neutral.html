<!doctype html>
<html><head><meta charset="utf-8"><title>Neutrals</title>
<link rel="stylesheet" href="_card.css">
<style>
  .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
  .sw { border-radius: var(--r-md); border: 1px solid var(--border-1); overflow: hidden; }
  .chip { height: 84px; }
  .meta { padding: 10px 12px 12px; }
  .name { font-family: var(--font-sans); font-size: 13px; font-weight: 700; color: var(--fg-1); }
  .role { font-family: var(--font-sans); font-size: 11px; color: var(--fg-3); margin-top: 2px; }
  .hex { font-family: var(--font-mono); font-size: 11px; color: var(--fg-3); margin-top: 6px; }
</style></head>
<body>
<div class="grid">
  <div class="sw"><div class="chip" style="background:#0B0E1A"></div><div class="meta"><div class="name">Ink</div><div class="role">Primary text</div><div class="hex">#0B0E1A</div></div></div>
  <div class="sw"><div class="chip" style="background:#2A2F40"></div><div class="meta"><div class="name">Graphite</div><div class="role">Secondary heading</div><div class="hex">#2A2F40</div></div></div>
  <div class="sw"><div class="chip" style="background:#5A6075"></div><div class="meta"><div class="name">Slate</div><div class="role">Body / caption</div><div class="hex">#5A6075</div></div></div>
  <div class="sw"><div class="chip" style="background:#8A90A4"></div><div class="meta"><div class="name">Mute</div><div class="role">Metadata</div><div class="hex">#8A90A4</div></div></div>

  <div class="sw"><div class="chip" style="background:#E3E5EE"></div><div class="meta"><div class="name">Line</div><div class="role">Hairline divider</div><div class="hex">#E3E5EE</div></div></div>
  <div class="sw"><div class="chip" style="background:#F4F5FA"></div><div class="meta"><div class="name">Tint</div><div class="role">Subtle panel</div><div class="hex">#F4F5FA</div></div></div>
  <div class="sw"><div class="chip" style="background:#FAFAF7"></div><div class="meta"><div class="name">Paper</div><div class="role">Canvas / page</div><div class="hex">#FAFAF7</div></div></div>
  <div class="sw"><div class="chip" style="background:#FFFFFF;border-bottom:1px solid var(--border-1)"></div><div class="meta"><div class="name">White</div><div class="role">Card surface</div><div class="hex">#FFFFFF</div></div></div>
</div>
</body></html>
